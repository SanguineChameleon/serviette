site_name: A Sufficiently Large Serviette
site_url: https://sanguinecha.me/serviette/
theme:
  name: material
  custom_dir: overrides
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: blue grey
      accent: light blue
      toggle:
        icon: material/circle-half-full
        name: Switch to dark mode

    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: blue grey
      accent: light blue
      toggle:
        icon: material/circle-half-full
        name: Switch to light mode

extra_css:
  - stylesheets/extra.css
